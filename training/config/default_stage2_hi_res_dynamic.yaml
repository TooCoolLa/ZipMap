defaults:
  - default_dataset.yaml
  - _self_
exp_name: ZipMap_stage2_hi_res_dynamic
img_size: 518

num_workers: 12
seed_value: 42
accum_steps: 1   # We did not use gradient accumulation in our training, while if you suffer from OOM, you can try to use it.
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 48
max_img_per_gpu_val: 48

limit_train_batches: 1000
limit_val_batches: 10
max_epochs: 40
base_data_dir: /path/to/your/data
min_num_images: 24

debug: False


model:
  _target_: zipmap.models.ZipMap.ZipMap
  enable_camera: True
  enable_depth: True
  enable_local_point: True
  other_config:
    use_gradient_checkpointing_local_point: True
    use_gradient_checkpointing_depth: True

  ttt_config:
    ttt_mode: True
    params:
      bias: True
      head_dim: 1024 # 256
      inter_multi: 2
      base_lr: 0.01
      muon_update_steps: 5
      use_gate_fn: True
    init_ttt_from_pretrained: True


logging:
  base_log_dir: logs
  log_dir: ${logging.base_log_dir}
  log_visuals: False
  log_freq: 1
  exp_name: ${exp_name}
  log_level_primary: INFO
  log_level_secondary: ERROR
  log_visual_frequency:
    train: 200
    val: 5
  visuals_keys_to_log:
    train:
      keys_to_log:
        - depth

    val:
      keys_to_log:
        - depth


  all_ranks: False

  logging_writer:
    _target_: train_utils.wandb_writer.WandBLogger
    project: ZipMap
    name: ${exp_name}
    dir: ${logging.base_log_dir}
    api_key_path: training/config/wandb_key.yaml
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_local_pts
        - loss_local_pts_normal
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_local_pts
        - loss_local_pts_normal


checkpoint:
  save_dir: ${logging.base_log_dir}/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: /path/to/your/stage1_checkpoint.ckpt
  re_init_train: True # only apply when resume_checkpoint_path is not None. If True, the model weights are loaded from the checkpoint, but the optimizer state and training progress (epoch, step) are reset. If False, training resumes exactly from where it left off.
  strict: False


loss:
  _target_: full_loss.Full_MultitaskLoss
  camera:
    weight: 5.0
    loss_type: "l1" # The paper uses smooth l1 loss, but we found l1 loss is more stable than smooth l1 and l2 loss.
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  local_point:
    weight: 1.0
  track: null


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-5
    weight_decay: 0.05

  # frozen_module_names:
      # - "*aggregator*"  # example, freeze the aggregator

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["depth_head"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["camera_head"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["local_point_head"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2

  ema:
    enabled: True
    decay: 0.999
    start_step: 200
    update_interval: 1
    device: null  # use the parameter device by default

  options:
    lr:
      - scheduler:  # Default for all other parameters
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 1e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 1e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    # weight_decay:
    #   - scheduler:
    #       _target_: fvcore.common.param_scheduler.ConstantParamScheduler
    #       value: 0.05





distributed:
  # Set use_fsdp: True to use FSDP instead of DDP
  use_fsdp: True  # Set to True if you want to use FSDP
  # DDP options (check https://docs.pytorch.org/docs/stable/generated/torch.nn.parallel.DistributedDataParallel.html)
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True  # Less memory used
  bucket_cap_mb: 25
  broadcast_buffers: True
  # FSDP options (only used when use_fsdp: True)
  fsdp_backward_prefetch: "backward_pre"  # "backward_pre" or "backward_post"
  fsdp_sharding_strategy: "hybrid_zero2"  # "full_shard", "shard_grad_op", "hybrid_full","hybrid_zero2", or "no_shard"
  fsdp_modules_to_wrap:
    - 'aggregator'
    - 'depth_head'
    - 'camera_head'
    - 'local_point_head'
  safe_fsdp_precision_modules:
    - 'camera_head'
    - 'depth_head'
    - 'local_point_head'

cuda:
    cudnn_deterministic: False
    cudnn_benchmark: False
    allow_tf32: True



data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    persistent_workers: True
    prefetch_factor: 4
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: ${debug}
      repeat_batch: False
      img_nums: [2, 48]
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.aria_syn_envir.AriaASEDataset
          split: train
          ARIA_SE_DIR: ${base_data_dir}/processed_aria_synthetic_environments
          len_train: 160000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.arkitscenes.ARKitScenesDataset
          split: train
          ARKitScenes_DIR: ${base_data_dir}/processed_arkitscenes
          len_train: 120000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.blendedmvs.BlendedMVSDataset
          split: train
          BlendedMVS_DIR: ${base_data_dir}/processed_blendedmvs
          len_train: 40000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: ${base_data_dir}/processed_co3d/co3d_raw
          CO3D_ANNOTATION_DIR: ${base_data_dir}/processed_co3d/co3d_anno 
          len_train: 160000
        - _target_: data.datasets.dl3dv.DL3DVDataset
          split: train
          DL3DV_DIR: ${base_data_dir}/processed_dl3dv
          len_train: 200000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.gta_sfm.GTASfMDataset
          split: train
          GTA_SfM_DIR: ${base_data_dir}/processed_GTA-SfM
          len_train: 15000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.hypersim.HyperSimDataset
          split: train
          HyperSim_DIR: ${base_data_dir}/processed_hypersim
          len_train: 40000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.mapfree.MapFreeDataset
          split: train
          MapFree_DIR: ${base_data_dir}/processed_mapfree
          len_train: 40000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.matrixcity.MatrixCityDataset
          split: train
          MATRIXCITY_DIR: ${base_data_dir}/processed_matrixcity/matrixcity_processed
          len_train: 80000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.megadepth.MegaDepthDataset
          split: train
          MegaDepth_DIR: ${base_data_dir}/processed_megadepth
          len_train: 20000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.midair.MidAirDataset
          split: train
          MidAir_DIR: ${base_data_dir}/processed_midair
          len_train: 80000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.mp3d.MP3DDataset
          split: train
          MP3D_DIR: ${base_data_dir}/processed_mp3d
          len_train: 80000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.mvs_synth.MVSSynthDataset
          split: train
          MVS_Synth_DIR: ${base_data_dir}/processed_mvs_synth
          len_train: 10000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.omniobject3d.OmniObject3DDataset
          split: train
          OMNIOBJECT3D_DIR: ${base_data_dir}/processed_omniobject3d
          len_train: 60000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.scannet.ScanNetDataset
          split: train
          ScanNet_DIR: ${base_data_dir}/processed_scannet
          len_train: 80000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.scannetpp.ScanNetppDataset
          split: train
          ScanNetpp_DIR: ${base_data_dir}/processed_scannetpp
          len_train: 30000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.scenenet.SceneNetDataset
          split: train
          SceneNet_DIR: ${base_data_dir}/processed_scenenet
          len_train: 120000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.tartanair.TartanAirDataset
          split: train
          TartanAir_DIR: ${base_data_dir}/processed_tartanair
          len_train: 40000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.tartanairv2.TartanAirV2Dataset
          split: train
          TartanAirV2_DIR: ${base_data_dir}/processed_tartanairv2
          len_train: 120000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.unreal4k.UnReal4KDataset
          split: train
          UNREAL4K_DIR: ${base_data_dir}/processed_unreal4k
          len_train: 10000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.vkitti.VKittiDataset
          split: train
          VKitti_DIR: ${base_data_dir}/processed_vkitti2
          len_train: 25000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.waymo.WaymoDataset
          split: train
          Waymo_DIR: ${base_data_dir}/processed_waymo
          len_train: 100000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.wildrgbd.WildRGBDDataset
          split: train
          WildRGBD_DIR: ${base_data_dir}/processed_wildrgbd
          len_train: 70000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.bedlam.BEDLAMDataset
          split: train
          BEDLAM_DIR: ${base_data_dir}/processed_bedlam
          len_train: 120000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.kubric.KubricDataset
          split: train
          KUBRIC_DIR: ${base_data_dir}/processed_cotracker3_kubric
          len_train: 300000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.dynamic_replica.DynamicReplicaDataset
          split: train
          DYNAMIC_REPLICA_DIR: ${base_data_dir}/processed_dynamic_replica
          len_train: 120000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.omniworld_game.OmniWorldGameDataset
          split: train
          OMNIWORLD_GAME_DIR: ${base_data_dir}/OmniWorld/OmniWorld-Game
          len_train: 500000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.pointodyssey.PointOdysseyDataset
          split: train
          POINTODYSSEY_DIR: ${base_data_dir}/processed_point_odyssey
          len_train: 70000
          min_num_images: ${min_num_images}
        - _target_: data.datasets.spring.SpringDataset
          split: train
          SPRING_DIR: ${base_data_dir}/processed_spring
          len_train: 4000
          min_num_images: ${min_num_images}


  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu_val}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      img_nums: [2, 48]
      debug: ${debug}
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.arkitscenes.ARKitScenesDataset
          split: test
          ARKitScenes_DIR: ${base_data_dir}/processed_arkitscenes
          len_test: 1000
